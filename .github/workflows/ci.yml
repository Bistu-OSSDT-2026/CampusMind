name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://fake:fake@localhost:5432/fake
          REDIS_URL: redis://localhost:6379

      - name: Run tests
        run: npm test
        env:
          DATABASE_URL: postgresql://fake:fake@localhost:5432/fake
          REDIS_URL: redis://localhost:6379