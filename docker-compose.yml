version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: campusmind-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - NEXT_PUBLIC_USER_ID=${NEXT_PUBLIC_USER_ID}
    depends_on:
      - db
      - redis
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: campusmind-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=campusmind
      - POSTGRES_USER=campusmind
      - POSTGRES_PASSWORD=campusmind
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: campusmind-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data: